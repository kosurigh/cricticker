<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CricHeroes Live Ticker — setup</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
       background:#0d1117;color:#e6edf3;line-height:1.6;padding:32px;max-width:760px;margin:0 auto;}
  h1{font-size:24px;margin:0 0 4px;}
  .sub{color:#9fb0c0;margin:0 0 28px;}
  code,kbd{background:#1b2330;border:1px solid #2a3645;border-radius:6px;padding:2px 7px;font-size:13px;}
  .box{background:#161b22;border:1px solid #2a3645;border-radius:12px;padding:18px 20px;margin:16px 0;}
  label{display:block;font-size:13px;color:#9fb0c0;margin:10px 0 4px;}
  input{width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;border:1px solid #2a3645;
        background:#0d1117;color:#e6edf3;font-size:15px;}
  a.btn{display:inline-block;margin-top:14px;background:#1e9e54;color:#fff;text-decoration:none;
        padding:10px 18px;border-radius:8px;font-weight:600;}
  .url{word-break:break-all;color:#7ee2a8;font-size:13px;margin-top:12px;}
</style>
</head>
<body>
  <h1>CricHeroes Live Ticker</h1>
  <p class="sub">Build a browser-source URL for OBS / Streamlabs / PRISM Live Studio.</p>

  <div class="box">
    <label>Match ID (from the scorecard URL, e.g. cricheroes.com/scorecard/<b>25801383</b>/…)</label>
    <input id="id" value="25801383" />
    <label>Ticker bar colour (translucent)</label>
    <div style="display:flex;gap:10px;align-items:center;">
      <input id="pick" type="color" value="#078BDC" style="width:54px;height:42px;padding:2px;" />
      <input id="bg" value="078BDC" style="flex:1;" />
    </div>
    <a class="btn" id="open" href="#" target="_blank">Open ticker ↗</a>
    <div class="url" id="url"></div>
  </div>

  <p style="color:#9fb0c0;font-size:14px;">Paste the generated URL into a <b>Browser Source</b>
     (1920×1080, transparent background). See <code>README.md</code> for deployment.</p>

<script>
  function build(){
    var id=document.getElementById('id').value.trim()||'25801383';
    var bg=document.getElementById('bg').value.trim().replace(/^#/,'');
    var u='ticker.html?id='+encodeURIComponent(id);
    if(bg) u+='&bg='+encodeURIComponent(bg);
    var abs=new URL(u, location.href).href;
    document.getElementById('open').href=u;
    document.getElementById('url').textContent=abs;
  }
  var pick=document.getElementById('pick'), bg=document.getElementById('bg');
  pick.addEventListener('input',function(){ bg.value=pick.value.replace(/^#/,'').toUpperCase(); build(); });
  bg.addEventListener('input',function(){
    var v=bg.value.trim().replace(/^#/,''); if(/^[0-9a-fA-F]{6}$/.test(v)) pick.value='#'+v; build();
  });
  document.getElementById('id').addEventListener('input',build);
  build();
</script>
</body>
</html>
